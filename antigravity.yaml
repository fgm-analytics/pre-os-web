llm_providers:
  local_ollama:
    api_type: "openai" # Ollama expõe uma API compatível com o formato da OpenAI
    base_url: "http://localhost:11434/v1"
    api_key: "ollama" # O Ollama não exige chave, mas o driver requer um preenchimento padrão

agents:
  - name: "Quality Assurance & Reviewer"
    profile: "qa_reviewer_agent.md"
    llm_config:
      provider: "local_ollama"
      model: "gemma4:e4b" # Nome exato do modelo com aspas para evitar erro de sintaxe
      temperature: 0.1 # Temperatura baixa é crítica para QA não alucinar em regras de código
      top_p: 0.9